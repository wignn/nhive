name: Build, Push, and Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  docker:
    name: Build & Push — ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - image: nhive-user-service
            dockerfile: services/user-service/Dockerfile
          - image: nhive-search-service
            dockerfile: services/search-service/Dockerfile
          - image: nhive-novel-service
            dockerfile: services/novel-service/Dockerfile
          - image: nhive-library-service
            dockerfile: services/library-service/Dockerfile
          - image: nhive-gateway
            dockerfile: services/gateway/Dockerfile
          - image: nhive-content-service
            dockerfile: services/content-service/Dockerfile
          - image: nhive-comment-service
            dockerfile: services/comment-service/Dockerfile
          - image: nhive-notification-service
            dockerfile: services/notification-service/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4


      - name: Sync docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.yml,scripts/"
          target: "~/nhive"
          overwrite: true

      - name: Setup Firebase Credentials on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            mkdir -p ~/nhive/services/notification-service
            echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > ~/nhive/services/notification-service/nhive-71b46-firebase-adminsdk-fbsvc-4ae7717497.json
            chmod 600 ~/nhive/services/notification-service/nhive-71b46-firebase-adminsdk-fbsvc-4ae7717497.json

      - name: Pull, deploy, and health-check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd ~/nhive

            echo "Saving current image tags for rollback..."
            docker compose images -q > /tmp/nhive_pre_deploy_images.txt 2>/dev/null || true

            echo "Pulling latest images..."
            docker compose pull

            echo "Restarting services..."
            docker compose up -d --remove-orphans

            echo "Waiting for gateway health check..."
            MAX_RETRIES=12   # 12 x 5s = 60 seconds
            RETRY=0
            until curl -sf http://localhost:8080/health > /dev/null 2>&1; do
              RETRY=$((RETRY + 1))
              if [ "$RETRY" -ge "$MAX_RETRIES" ]; then
                echo "ERROR: Gateway health check failed after ${MAX_RETRIES} retries!"
                echo "--- Container status ---"
                docker compose ps
                echo "--- Gateway logs (last 50 lines) ---"
                docker compose logs --tail=50 gateway
                exit 1
              fi
              echo "  Attempt $RETRY/$MAX_RETRIES — waiting 5s..."
              sleep 5
            done
            echo "Gateway is healthy!"

            echo "Verifying all services are running..."
            UNHEALTHY=$(docker compose ps --format json 2>/dev/null \
              | python3 -c "
            import sys, json
            containers = [json.loads(l) for l in sys.stdin if l.strip()]
            bad = [c['Name'] for c in containers if c.get('State','') not in ('running','')]
            print('\n'.join(bad))
            " 2>/dev/null || true)

            if [ -n "$UNHEALTHY" ]; then
              echo "ERROR: The following containers are not running:"
              echo "$UNHEALTHY"
              docker compose ps
              exit 1
            fi

            docker image prune -f

            echo "Deployment successful!"
            docker compose ps

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 5m
          script: |
            cd ~/nhive
            echo "Deploy failed — attempting rollback to previous images..."
            # Pull the sha-tagged images from the previous commit if available
            # For now: restart with whatever was working before
            docker compose restart
            echo "Rollback complete. Current status:"
            docker compose ps

      - name: Notify Discord — Success
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: success
          title: "NovelHive Deployed"
          description: |
            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
            **By:** ${{ github.actor }}
          color: 0x00ff88
          nodetail: false

      - name: Notify Discord — Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: failure
          title: "NovelHive Deploy Failed"
          description: |
            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
            **By:** ${{ github.actor }}
            Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
          color: 0xff4444

