name: Build, Scan & Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  MIN_SEVERITY: CRITICAL,HIGH

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Dockerfiles (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: warning]
          ignore: DL3008,DL3015,DL3018

      - name: Validate docker-compose / manifests
        run: |
          if [ -f docker-compose.yml ]; then
            docker compose config --quiet
          fi

  test:
    name: Test — ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: nhive-user-service
            dockerfile: user-service/Dockerfile
            context: user-service
          - image: nhive-search-service
            dockerfile: search-service/Dockerfile
            context: search-service
          - image: nhive-novel-service
            dockerfile: novel-service/Dockerfile
            context: novel-service
          - image: nhive-library-service
            dockerfile: library-service/Dockerfile
            context: library-service
          - image: nhive-gateway
            dockerfile: gateway/Dockerfile
            context: gateway
          - image: nhive-content-service
            dockerfile: content-service/Dockerfile
            context: content-service
          - image: nhive-comment-service
            dockerfile: comment-service/Dockerfile
            context: comment-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run unit tests
        working-directory: ${{ matrix.context }}
        run: |
          if [ -f Makefile ] && grep -q "^test:" Makefile; then
            make test
          elif [ -f package.json ]; then
            npm ci && npm test
          elif [ -f go.mod ]; then
            go test ./... -race -coverprofile=coverage.out
          elif [ -f Cargo.toml ]; then
            cargo test --all-features
          else
            echo "No test runner found, skipping"
          fi

  
  docker:
    name: Docker — ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write         
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: nhive-user-service
            dockerfile: user-service/Dockerfile
            context: user-service
          - image: nhive-search-service
            dockerfile: search-service/Dockerfile
            context: search-service
          - image: nhive-novel-service
            dockerfile: novel-service/Dockerfile
            context: novel-service
          - image: nhive-library-service
            dockerfile: library-service/Dockerfile
            context: library-service
          - image: nhive-gateway
            dockerfile: gateway/Dockerfile
            context: gateway
          - image: nhive-content-service
            dockerfile: content-service/Dockerfile
            context: content-service
          - image: nhive-comment-service
            dockerfile: comment-service/Dockerfile
            context: comment-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign (keyless signing)
        uses: sigstore/cosign-installer@v3.5.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.vendor=nhive
            org.opencontainers.image.source=${{ github.repositoryUrl }}

      - name: Build image (without push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true                       
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: true
          sbom: true

      - name: Scan image — Trivy
        id: trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: ${{ env.MIN_SEVERITY }}
          exit-code: "1"                 
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy SARIF to GitHub Security
        if: always()                          # Upload even if scan found issues
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}

      - name: Push image to registry
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: true
          sbom: true

      - name: Sign image with Cosign (OIDC keyless)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      - name: Attach SBOM attestation
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate cyclonedx.sbom.json \
            --type cyclonedx \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}@${DIGEST}
        continue-on-error: true               # Non-blocking: SBOM best-effort


