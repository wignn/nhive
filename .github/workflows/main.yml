name: Build, Scan & Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  MIN_SEVERITY: CRITICAL,HIGH

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: warning
          ignore: DL3008,DL3015,DL3018

      - name: Validate docker-compose / manifests
        run: |
          if [ -f docker-compose.yml ]; then
            for dir in */; do
              if [ -f "${dir}Dockerfile" ] && [ ! -f "${dir}.env" ]; then
                touch "${dir}.env"
              fi
            done
            docker compose config --quiet
          fi

  test:
    name: Test - ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: nhive-user-service
            dockerfile: user-service/Dockerfile
            context: user-service

          - image: nhive-search-service
            dockerfile: search-service/Dockerfile
            context: search-service

          - image: nhive-novel-service
            dockerfile: novel-service/Dockerfile
            context: novel-service

          - image: nhive-library-service
            dockerfile: library-service/Dockerfile
            context: library-service

          - image: nhive-gateway
            dockerfile: gateway/Dockerfile
            context: gateway

          - image: nhive-content-service
            dockerfile: content-service/Dockerfile
            context: content-service

          - image: nhive-comment-service
            dockerfile: comment-service/Dockerfile
            context: comment-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests
        working-directory: ${{ matrix.context }}
        run: |
          if [ -f go.mod ]; then
            go test ./...
          elif [ -f package.json ]; then
            npm ci && npm test
          elif [ -f Cargo.toml ]; then
            cargo test
          else
            echo "No tests found"
          fi

  docker:
    name: Docker - ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      security-events: write
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: nhive-user-service
            dockerfile: user-service/Dockerfile
            context: user-service

          - image: nhive-search-service
            dockerfile: search-service/Dockerfile
            context: search-service

          - image: nhive-novel-service
            dockerfile: novel-service/Dockerfile
            context: novel-service

          - image: nhive-library-service
            dockerfile: library-service/Dockerfile
            context: library-service

          - image: nhive-gateway
            dockerfile: gateway/Dockerfile
            context: gateway

          - image: nhive-content-service
            dockerfile: content-service/Dockerfile
            context: content-service

          - image: nhive-comment-service
            dockerfile: comment-service/Dockerfile
            context: comment-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=tag

      - name: Build local image for scan
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: localscan:${{ matrix.image }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localscan:${{ matrix.image }}
          format: sarif
          output: trivy.sarif
          severity: ${{ env.MIN_SEVERITY }}
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy-${{ matrix.image }}

      - name: Push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}