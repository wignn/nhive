services:
  postgres:
    image: postgres:16-alpine
    container_name: novelhive-postgres
    networks:
      - novelhive-net
    environment:
      POSTGRES_DB: novelhive
      POSTGRES_USER: novelhive
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novelhive"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: novelhive-redis
    networks:
      - novelhive-net
    ports:
      - "16379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: novelhive-elasticsearch
    networks:
      - novelhive-net
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "19200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  nats:
    image: nats:2-alpine
    container_name: novelhive-nats
    networks:
      - novelhive-net
    command: ["--jetstream", "--store_dir=/data", "-p", "4222", "-m", "8222"]
    ports:
      - "14222:4222"
      - "18224:8222"
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: novelhive-user-service
    image: wign/nhive-user-service
    restart: unless-stopped
    networks:
      - novelhive-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://novelhive:${POSTGRES_PASSWORD}@postgres:5432/novelhive_users?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: novelhive-super-secret-key-change-in-production
      GRPC_PORT: "50051"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      APP_ENV: production
      LOG_LEVEL: info

  novel-service:
    build:
      context: .
      dockerfile: services/novel-service/Dockerfile
    container_name: novelhive-novel-service
    image: wign/nhive-novel-service
    restart: unless-stopped
    networks:
      - novelhive-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://novelhive:${POSTGRES_PASSWORD}@postgres:5432/novelhive_novels?sslmode=disable
      REDIS_URL: redis://redis:6379/1
      NATS_URL: nats://nats:4222
      GRPC_PORT: "50052"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      APP_ENV: production
      LOG_LEVEL: info

  content-service:
    build:
      context: .
      dockerfile: services/content-service/Dockerfile
    container_name: novelhive-content-service
    image: wign/nhive-content-service
    restart: unless-stopped
    networks:
      - novelhive-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://novelhive:${POSTGRES_PASSWORD}@postgres:5432/novelhive_novels?sslmode=disable
      REDIS_URL: redis://redis:6379/2
      GRPC_PORT: "50053"
      APP_ENV: production
      RUST_LOG: content_service=info

  search-service:
    build:
      context: .
      dockerfile: services/search-service/Dockerfile
    container_name: novelhive-search-service
    image: wign/nhive-search-service
    restart: unless-stopped
    networks:
      - novelhive-net
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      REDIS_URL: redis://redis:6379/3
      NATS_URL: nats://nats:4222
      GRPC_PORT: "50054"
      APP_ENV: production
      RUST_LOG: search_service=info

  comment-service:
    build:
      context: .
      dockerfile: services/comment-service/Dockerfile
    container_name: novelhive-comment-service
    image: wign/nhive-comment-service
    restart: unless-stopped
    networks:
      - novelhive-net
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
    environment:
      DATABASE_URL: postgres://novelhive:${POSTGRES_PASSWORD}@postgres:5432/novelhive_comments?sslmode=disable
      GRPC_PORT: "50055"
      USER_SERVICE_ADDR: user-service:50051
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      APP_ENV: production
      LOG_LEVEL: info

  library-service:
    build:
      context: .
      dockerfile: services/library-service/Dockerfile
    container_name: novelhive-library-service
    image: wign/nhive-library-service
    restart: unless-stopped
    networks:
      - novelhive-net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://novelhive:${POSTGRES_PASSWORD}@postgres:5432/novelhive_library?sslmode=disable
      GRPC_PORT: "50056"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      APP_ENV: production
      LOG_LEVEL: info

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: notification-service
    image: wign/nhive-notification-service
    restart: unless-stopped
    networks:
      - novelhive-net
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      library-service:
        condition: service_started
    volumes:
      - ./services/notification-service/nhive-71b46-firebase-adminsdk-fbsvc-4ae7717497.json:/run/secrets/firebase-service-account.json:ro
    environment:
      DATABASE_URL: postgres://novelhive:${POSTGRES_PASSWORD}@postgres:5432/novelhive_notifications?sslmode=disable
      NATS_URL: nats://nats:4222
      LIBRARY_SERVICE_ADDR: library-service:50056
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      FIREBASE_CREDENTIALS: /run/secrets/firebase-service-account.json
      APP_ENV: production
      LOG_LEVEL: info

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: novelhive-gateway
    image: wign/nhive-gateway
    restart: unless-stopped
    networks:
      - novelhive-net
    depends_on:
      - user-service
      - novel-service
      - comment-service
      - library-service
      - notification-service
    env_file:
      - ./services/gateway/.env
    environment:
      USER_SERVICE_ADDR: user-service:50051
      NOVEL_SERVICE_ADDR: novel-service:50052
      COMMENT_SERVICE_ADDR: comment-service:50055
      LIBRARY_SERVICE_ADDR: library-service:50056
      NOTIFICATION_SERVICE_ADDR: notification-service:50057
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      GATEWAY_API_KEYS: ${GATEWAY_API_KEYS}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      R2_URL: ${R2_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_IDS: ${GOOGLE_CLIENT_IDS}
      APP_ENV: production
      LOG_LEVEL: info
    ports:
      - "8080:8080"  

  # web:
  #   build:
  #     context: ./apps/web
  #     dockerfile: Dockerfile
  #   container_name: web
  #   restart: unless-stopped
  #   networks:
  #     - novelhive-net
  #   depends_on:
  #     - gateway
  #   env_file:
  #     - .env
  #   ports:
  #     - "3001:3000"

volumes:
  pgdata:
  redisdata:
  esdata:
  natsdata:

networks:
  novelhive-net:
    driver: bridge
