syntax = "proto3";

package content.v1;

option go_package = "github.com/novelhive/proto/content/v1;contentv1";

service ContentService {
  rpc GetChapterContent(GetChapterContentRequest) returns (ChapterContent);
  rpc GetAdjacentChapters(GetAdjacentChaptersRequest) returns (AdjacentChaptersResponse);
}

message GetChapterContentRequest {
  string novel_slug = 1;
  int32 chapter_number = 2;
}

message ChapterContent {
  string id = 1;
  string novel_id = 2;
  string novel_title = 3;
  string novel_slug = 4;
  int32 number = 5;
  string title = 6;
  string content = 7;
  int32 word_count = 8;
  int32 total_chapters = 9;
  string created_at = 10;
}

message GetAdjacentChaptersRequest {
  string novel_id = 1;
  int32 current_chapter = 2;
}

message AdjacentChaptersResponse {
  bool has_prev = 1;
  bool has_next = 2;
  int32 prev_number = 3;
  int32 next_number = 4;
}
