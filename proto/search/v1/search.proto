syntax = "proto3";

package search.v1;

option go_package = "github.com/novelhive/proto/search/v1;searchv1";

service SearchService {
  rpc SearchNovels(SearchRequest) returns (SearchResponse);
  rpc Autocomplete(AutocompleteRequest) returns (AutocompleteResponse);
  rpc IndexNovel(IndexNovelRequest) returns (IndexResponse);
  rpc RemoveNovel(RemoveNovelRequest) returns (IndexResponse);
}

message SearchRequest {
  string query = 1;
  int32 page = 2;
  int32 page_size = 3;
  string genre = 4;
  string status = 5;
}

message SearchResponse {
  repeated SearchHit hits = 1;
  int32 total = 2;
  int32 page = 3;
  float took_ms = 4;
}

message SearchHit {
  string id = 1;
  string title = 2;
  string slug = 3;
  string synopsis = 4;
  string author = 5;
  string cover_url = 6;
  repeated string genres = 7;
  float score = 8;
  string highlight = 9;
}

message AutocompleteRequest {
  string query = 1;
  int32 limit = 2;
}

message AutocompleteResponse {
  repeated AutocompleteSuggestion suggestions = 1;
}

message AutocompleteSuggestion {
  string title = 1;
  string slug = 2;
  string author = 3;
}

message IndexNovelRequest {
  string id = 1;
  string title = 2;
  string slug = 3;
  string synopsis = 4;
  string author = 5;
  string cover_url = 6;
  repeated string genres = 7;
  string status = 8;
  int32 total_chapters = 9;
}

message RemoveNovelRequest {
  string id = 1;
}

message IndexResponse {
  bool success = 1;
}
