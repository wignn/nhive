syntax = "proto3";

package comment.v1;

option go_package = "github.com/novelhive/proto/comment/v1;commentv1";

service CommentService {
  rpc ListComments(ListCommentsRequest) returns (ListCommentsResponse);
  rpc CreateComment(CreateCommentRequest) returns (Comment);
  rpc ReplyToComment(ReplyToCommentRequest) returns (Comment);
  rpc LikeComment(LikeCommentRequest) returns (LikeCommentResponse);
  rpc DeleteComment(DeleteCommentRequest) returns (DeleteCommentResponse);
}

message Comment {
  string id = 1;
  string chapter_id = 2;
  string user_id = 3;
  string username = 4;
  string avatar_url = 5;
  string content = 6;
  string parent_id = 7;
  int32 likes_count = 8;
  int32 reply_count = 9;
  repeated Comment replies = 10;
  string created_at = 11;
}

message ListCommentsRequest {
  string chapter_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  string sort_by = 4;
}

message ListCommentsResponse {
  repeated Comment comments = 1;
  int32 total = 2;
  int32 page = 3;
}

message CreateCommentRequest {
  string chapter_id = 1;
  string user_id = 2;
  string content = 3;
}

message ReplyToCommentRequest {
  string parent_id = 1;
  string user_id = 2;
  string content = 3;
}

message LikeCommentRequest {
  string comment_id = 1;
  string user_id = 2;
}

message LikeCommentResponse {
  int32 likes_count = 1;
  bool liked = 2;
}

message DeleteCommentRequest {
  string comment_id = 1;
  string user_id = 2;
}

message DeleteCommentResponse {
  bool success = 1;
}
