syntax = "proto3";

package user.v1;

option go_package = "github.com/novelhive/proto/user/v1;userv1";

import "google/protobuf/struct.proto";

service UserProfileService {
  rpc UpdateAvatar(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc SignInWithOAuth(google.protobuf.Struct) returns (google.protobuf.Struct);
}
